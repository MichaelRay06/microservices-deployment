name: product-catalog-ci

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "kubernetes/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/product-catalog
  IMAGE_TAG: ${{ github.sha }}

# -------------------------------------------------------
# JOB: BUILD + TEST
# -------------------------------------------------------
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go version

      - name: Download dependencies
        working-directory: src/product-catalog
        run: go mod download

      - name: Build
        working-directory: src/product-catalog
        run: |
          go mod tidy
          go build -v -o product-catalog .

      - name: Test
        working-directory: src/product-catalog
        run: go test ./... -v

#
# -------------------------------------------------------
#JOB: CODE QUALITY
# -------------------------------------------------------
  code-quality:
    runs-on: ubuntu-latest
    needs: go-security

    steps:
      - uses: actions/checkout@v4

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          working-directory: src/product-catalog

# -------------------------------------------------------
# JOB: GITLEAKS
# -------------------------------------------------------
  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - uses: gitleaks/gitleaks-action@v2

      - run: gitleaks detect --source ./src/product-catalog --exit-code 1

# -------------------------------------------------------
# JOB: TRIVY FS SCAN
# -------------------------------------------------------
  trivy_fs_scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src/product-catalog
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true

# -------------------------------------------------------
# JOB: DOCKER BUILD & PUSH
# -------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: trivy_fs_scan

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: src/product-catalog
          file: src/product-catalog/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

# -------------------------------------------------------
# JOB: TRIVY IMAGE SCAN
# -------------------------------------------------------
  trivy_image_scan:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

# -------------------------------------------------------
# JOB: GITOPS UPDATE
# -------------------------------------------------------
  updatek8s:
    runs-on: ubuntu-latest
    needs: trivy_image_scan

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CICD_GITHUB_TOKEN }}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|" \
            kubernetes/productcatalog/deploy.yaml

      - name: Commit & push
        run: |
          git config --global user.email "michaelo.ray06@gmail.com"
          git config --global user.name "MichaelRay06"

          git add kubernetes/productcatalog/deploy.yaml
          git diff --quiet || git commit -m "[GitOps] product-catalog -> ${{ env.IMAGE_TAG }}"
          git push origin HEAD:main