name: product-catalog-ci

on:
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build service
        working-directory: src/product-catalog
        run: |
          go mod download
          go build -o product-catalog-service main.go

      - name: Run unit tests
        working-directory: src/product-catalog
        run: go test ./...


  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          working-directory: src/product-catalog


  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: src/product-catalog
          file: src/product-catalog/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}
            ${{ secrets.DOCKER_USERNAME }}/product-catalog:latest


  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout code (GitOps Repo)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CICD_GITHUB_TOKEN }}

      - name: Update Kubernetes deployment tag
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|" \
            kubernetes/productcatalog/deploy.yaml

      - name: Commit and push manifest updates
        run: |
          git config --global user.email "michaelo.ray06@gmail.com"
          git config --global user.name "MichaelRay06"

          git add kubernetes/productcatalog/deploy.yaml
          git commit -m "[CI]: Update product catalog image tag to ${{ github.run_id }}"
          git push origin HEAD:main