name: product-catalog-ci

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "kubernetes/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/product-catalog
  IMAGE_TAG: ${{ github.sha }}

jobs:

# -------------------------------------------------------
# BUILD + TEST
# -------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go version

      - name: Download dependencies
        working-directory: src/product-catalog
        run: go mod download

      - name: Build
        working-directory: src/product-catalog
        run: |
          go mod tidy
          go build -v -o product-catalog .

      - name: Test
        working-directory: src/product-catalog
        run: go test ./... -v

# -------------------------------------------------------
# GOVULNCHECK (Dockerized)
# -------------------------------------------------------
  

# -------------------------------------------------------
# GOLANGCI-LINT (Dockerized)
# -------------------------------------------------------
 

# -------------------------------------------------------
# GITLEAKS (Dockerized)
# -------------------------------------------------------


# -------------------------------------------------------
# TRIVY FS SCAN (Dockerized)
# -------------------------------------------------------
  trivy_fs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            aquasec/trivy:latest \
            fs --severity CRITICAL,HIGH \
               --ignore-unfixed \
               /project/src/product-catalog

# -------------------------------------------------------
# DOCKER BUILD & PUSH
# -------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: trivy_fs

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: src/product-catalog
          file: src/product-catalog/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Scan Docker Image with Trivy   # --rm means remove the Trivy image when scanning is completed 
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

# -------------------------------------------------------
# GITOPS UPDATE
# -------------------------------------------------------
  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CICD_GITHUB_TOKEN }}

      - name: Update manifest
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|" \
            kubernetes/productcatalog/deploy.yaml

      - name: Commit & push
        run: |
          git config --global user.email "michaelo.ray06@gmail.com"
          git config --global user.name "MichaelRay06"

          git add kubernetes/productcatalog/deploy.yaml
          git diff --quiet || git commit -m "[GitOps] product-catalog -> ${{ env.IMAGE_TAG }}"
          git push origin HEAD:main